version: "3"
services:
  app:
    container_name: app-fratm
    build: .
    command: nodemon --watch /usr/src/app -e js app.js
    environment:
      MONGODB_HOST: mongo
      MONGODB_DB: ${MONGODB_DB:-provolone}
    ports:
      - "3000:3000"
    volumes:
      - ./app:/usr/src/app
    depends_on:
      - mongo
  mongo:
    container_name: mongo-fratm
    image: mongo
    volumes:
      - ./data:/data/db
    ports:
      - '27017:27017'
